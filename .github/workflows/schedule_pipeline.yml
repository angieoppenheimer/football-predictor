name: Execute Predictive Analytics Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install requests
        # Aggiungi qui pandas, numpy o altre librerie se l'algoritmo in main.py le richiede
        # pip install pandas

    - name: Run Predictive Analytics Engine
      env:
        API_FOOTBALL_KEY: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      run: python main.py

    - name: Commit and Push Generated JSON Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Aggiunge solo la cartella dei dati per evitare conflitti strani
        git add data/
        
        # Esegue il commit solo se ci sono effettivi cambiamenti nei dati
        git diff-index --quiet HEAD || git commit -m "Automated Data Update: $(date +'%Y-%m-%d')"
        git push
